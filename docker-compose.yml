services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bookstore
      POSTGRES_USER: bookstore   
      POSTGRES_PASSWORD: bookstore   
    ports:
      - "5432:5432"
    networks:
      - backend

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - backend

networks:
  backend:
    driver: bridge
